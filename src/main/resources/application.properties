spring.application.name=ResumeForge AI Backend

server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.validate-migration-naming=true
# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false


# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.out-of-order=false

# JWT
app.jwt-secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# OpenRouter / AI
app.openrouter.api-key=${OPENROUTER_API_KEY}
app.openrouter.base-url=https://openrouter.ai/api/v1/chat/completions
app.openrouter.model=openai/gpt-4o-mini
app.openrouter.site-url=${APP_SITE_URL:https://www.resumeforgeai.site}
app.openrouter.site-name=${APP_SITE_NAME:ResumeForge AI}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGIN:https://resumeforgeai.site,https://www.resumeforgeai.site}

# Razorpay
app.razorpay.key-id=${RAZORPAY_KEY_ID}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET}
app.razorpay.payment-link=${RAZORPAY_PAYMENT_LINK}
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET}

# Email / Resend
app.resend.api-key=${RESEND_API_KEY}
app.mail.from-email=${MAIL_FROM_EMAIL:support@resumeforgeai.site}
app.mail.from-name=${MAIL_FROM_NAME:ResumeForge AI}
app.contact.receiver-email=${CONTACT_RECEIVER_EMAIL}

# Error handling
server.error.include-message=never
server.error.include-binding-errors=never
